services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatv2
      POSTGRES_PASSWORD: chatv2_dev_password
      POSTGRES_DB: chatv2
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatv2"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: chatv2
      MINIO_ROOT_PASSWORD: chatv2_dev_password
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "3311:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      # First boot downloads virus definitions (can take a few minutes).
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - "3012:3000"
    command:
      - "gotenberg"
      - "--api-timeout=60s"
      - "--libreoffice-auto-start=true"

volumes:
  postgres-data:
  minio-data:
  clamav-data:
