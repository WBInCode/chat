server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statyki SPA — fallback do index.html dla routingu klienta.
    # index.html NIGDY nie jest cache'owany (hashowane assety robią cache-busting).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # REST API → chat-api
    location /api/ {
        proxy_pass http://wb-chat-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # socket.io (ścieżka /ws) → chat-api, z upgradem do WebSocket
    location /ws {
        proxy_pass http://wb-chat-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
