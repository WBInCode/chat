name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full-history scan (Mondays 06:00 UTC).
    - cron: "0 6 * * 1"

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so pushed commits are scanned, not just the diff.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Fail only on high/critical advisories to avoid noise from transitive lows.
      - name: pnpm audit
        run: pnpm audit --audit-level=high
