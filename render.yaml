databases:
  - name: chatv2-db
    plan: free
    databaseName: chatv2
    user: chatv2

services:
  # --- Backend API (Fastify + Socket.IO) ---
  - type: web
    name: chatv2-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @chatv2/shared build &&
      pnpm --filter @chatv2/api exec prisma generate &&
      pnpm --filter @chatv2/api build &&
      pnpm --filter @chatv2/api exec prisma migrate deploy
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: chatv2-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chatv2-redis
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false

  # --- Redis (BullMQ queues + Socket.IO adapter) ---
  - type: redis
    name: chatv2-redis
    plan: free
    region: frankfurt
    ipAllowList: []

  # --- Frontend (React/Vite static build) ---
  - type: web
    runtime: static
    name: chatv2-web
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @chatv2/shared build &&
      pnpm --filter @chatv2/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: chatv2-api
          property: hostport
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
